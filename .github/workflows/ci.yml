name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          curl -sSfL "$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -o 'https://[^"]*linux_x64.tar.gz')" | tar xz
          ./gitleaks git --source . --verbose --redact

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Check for large files
        run: |
          LARGE=$(find . -not -path './.git/*' -not -path './node_modules/*' -type f -size +5M)
          if [ -n "$LARGE" ]; then
            echo "::error::Large files detected (>5 MB):"
            echo "$LARGE"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: npx license-checker --failOn "GPL-2.0;GPL-3.0;AGPL-3.0"

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package verification
        run: |
          npx vsce package --no-dependencies
          VSIX=$(ls *.vsix)
          SIZE=$(stat -c%s "$VSIX" 2>/dev/null || stat -f%z "$VSIX")
          echo "Package: $VSIX ($((SIZE / 1024)) KB)"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::error::VSIX exceeds 5 MB ($((SIZE / 1024 / 1024)) MB) — add files to .vscodeignore"
            exit 1
          fi
          rm -f "$VSIX"
